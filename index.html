<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiçkorkmaz Garaj V7</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">HG</div>
        <div>
          <h1>Hiçkorkmaz Garaj</h1>
          <span>V7 Filo & Servis Takip</span>
        </div>
      </div>

      <nav>
        <button class="nav-btn active" data-page="dashboard">Dashboard</button>
        <button class="nav-btn" data-page="customers">Müşteriler / Firmalar</button>
        <button class="nav-btn" data-page="vehicles">Araçlar</button>
        <button class="nav-btn" data-page="services">Servis Kayıtları</button>
        <button class="nav-btn" data-page="payments">Tahsilatlar</button>
        <button class="nav-btn" data-page="debts">Borç Takibi</button>
        <button class="nav-btn" data-page="reports">Raporlar</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Dashboard</h2>
          <p>İsim, firma veya plakaya göre hızlı takip</p>
        </div>
        <div class="search-wrap">
          <input id="globalSearch" type="search" placeholder="İsim, soyisim, firma adı veya plaka ara..." />
          <div id="searchResults" class="search-results hidden"></div>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="customers" class="page"></section>
      <section id="vehicles" class="page"></section>
      <section id="services" class="page"></section>
      <section id="payments" class="page"></section>
      <section id="debts" class="page"></section>
      <section id="reports" class="page"></section>
      <section id="detail" class="page"></section>
    </main>
  </div>

  <div class="fab-row">
    <button id="addCustomerBtn" class="fab">+ Müşteri/Firma</button>
    <button id="addVehicleBtn" class="fab secondary">+ Araç</button>
    <button id="addServiceBtn" class="fab secondary">+ Servis</button>
    <button id="addPaymentBtn" class="fab secondary">+ Tahsilat</button>
  </div>

  <dialog id="modal">
    <form method="dialog" id="modalForm">
      <h3 id="modalTitle">Kayıt</h3>
      <div id="modalFields"></div>
      <menu>
        <button value="cancel" class="ghost">Vazgeç</button>
        <button id="saveModal" value="default" class="primary">Kaydet</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
