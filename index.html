<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Garaj V7" />
  <title>Hiçkorkmaz Garaj V7</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand-logo login-logo">HG</div>
      <h1>Hiçkorkmaz Garaj</h1>
      <p>Admin / Personel Girişi</p>

      <form id="loginForm">
        <div class="field">
          <label>E-posta</label>
          <input id="loginEmail" type="email" placeholder="admin@aractakip.com" required />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" required />
        </div>
        <button class="btn primary login-btn" type="submit">Giriş Yap</button>
      </form>

      <p class="login-help">
        Yetki, Firebase'te oluşturduğun e-posta adresine göre belirlenir.
      </p>
      <p id="loginError" class="login-error hidden"></p>
    </div>
  </div>
<div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">HG</div>
        <div>
          <h1>Hiçkorkmaz Garaj</h1>
          <p>V7 Profesyonel Takip</p>
        </div>
      </div>

      <nav class="menu">
        <button class="menu-item active" data-page="dashboard">Dashboard</button>
        <button class="menu-item" data-page="customers">Müşteriler / Firmalar</button>
        <button class="menu-item" data-page="vehicles">Araçlar</button>
        <button class="menu-item" data-page="services">Servis Kayıtları</button>
        <button class="menu-item" data-page="payments">Tahsilatlar</button>
        <button class="menu-item" data-page="debts">Borç Takibi</button>
        <button class="menu-item" data-page="reports">Raporlar</button>
        <button class="menu-item" data-page="settings">Ayarlar</button>
      </nav>
    </aside>

    <button id="mobileMenuBtn" class="mobile-menu-btn">☰ Menü</button>
    <div id="mobileOverlay" class="mobile-overlay"></div>

    <main class="content">
      <header class="header">
        <div>
          <h2 id="pageTitle">Dashboard</h2>
          <p id="pageSubtitle">Her ekranda isim, firma veya plaka ile global arama</p>
        </div>

        <div class="user-bar" id="userBar"><span id="activeUserText">Kullanıcı</span><button class="small-btn" id="logoutBtn">Çıkış</button></div>

        <div class="search-area">
          <input id="globalSearch" autocomplete="off" placeholder="İsim, soyisim, firma adı veya plaka ara..." />
          <div id="searchResults" class="search-results hidden"></div>
        </div>
      </header>

      <section id="dashboard" class="page active"></section>
      <section id="customers" class="page"></section>
      <section id="vehicles" class="page"></section>
      <section id="services" class="page"></section>
      <section id="payments" class="page"></section>
      <section id="debts" class="page"></section>
      <section id="reports" class="page"></section>
      <section id="settings" class="page"></section>
      <section id="detail" class="page"></section>
    </main>
  </div>

  <div class="quick-actions">
    <button class="action primary" id="btnCustomer">+ Müşteri/Firma</button>
    <button class="action" id="btnVehicle">+ Araç</button>
    <button class="action" id="btnService">+ Servis</button>
    <button class="action" id="btnPayment">+ Tahsilat</button>
  </div>

  <dialog id="modal">
    <form id="modalForm" method="dialog">
      <div class="modal-head">
        <h3 id="modalTitle">Kayıt Ekle</h3>
        <button type="button" class="icon-btn" id="closeModal">×</button>
      </div>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="cancelModal">Vazgeç</button>
        <button type="submit" class="btn primary">Kaydet</button>
      </div>
    </form>
  </dialog>

  
  <script type="module" src="app.js"></script>
</body>
</html>
